name: Deploy backend to atlas.meteo.gov.gh

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Pull and deploy backend on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo /opt/ghclimateatlas/deploy/scripts/deploy_backend_checkout.sh
